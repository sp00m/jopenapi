openapi: 3.1.1
components:
  schemas:
    
    LocalEnumWithoutDefault:
      type: string
      enum:
        - foo
        - bar
    
    LocalEnumWithDefault:
      type: string
      enum:
        - foo
        - bar
      default: foo

    LocalCommonObject:
      type: object
      properties:
        name:
          type: string
      required:
        - name

    SimpleExternalRef:
      $ref: "../common.yml#/components/schemas/CommonObject"

    SimpleLocalRef:
      $ref: "#/components/schemas/LocalCommonObject"

    RefVariations:
      type: object
      properties:
        mandatory_ref:
          $ref: "#/components/schemas/LocalCommonObject"
        optional_ref:
          $ref: "#/components/schemas/LocalCommonObject"
        ref_array:
          type: array
          items:
            $ref: "#/components/schemas/LocalCommonObject"
        ref_map:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/LocalCommonObject"
        local_enum_without_default:
          $ref: "#/components/schemas/LocalEnumWithoutDefault"
        local_enum_without_default_defaulted_locally:
          $ref: "#/components/schemas/LocalEnumWithoutDefault"
          default: bar
        local_enum_with_default:
          $ref: "#/components/schemas/LocalEnumWithDefault"
        local_enum_with_default_defaulted_locally:
          $ref: "#/components/schemas/LocalEnumWithDefault"
          default: bar
      required:
        - mandatory_ref
        - ref_array
        - ref_map
